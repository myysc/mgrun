name: proxy_mgscan

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  proxy-ip:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Create necessary directories
      run: |
        mkdir -p mg/IP
        mkdir -p data
        
    - name: Run proxy scanner
      run: |
        python py/mg_scan.py
        
    - name: List generated files
      run: |
        echo "Generated files in mg/IP:"
        ls -la mg/IP/ || echo "No files in mg/IP/"
        echo ""
        echo "Generated files in data:"
        ls -la data/ || echo "No files in data/"
        
    - name: Commit and push if changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 显示当前状态（调试用）
        echo "Current git status:"
        git status
        
        # 添加所有生成的目录
        git add mg/ data/
        
        # 显示暂存区状态（调试用）
        echo "Files staged:"
        git diff --cached --name-only
        
        # 检查是否有变更
        if git diff --cached --quiet; then
          echo "没有发现文件变化，跳过提交"
        else
          echo "发现文件变化，准备提交..."
          git commit -m "mg更新 proxy IP $(date '+%Y-%m-%d %H:%M:%S')"
          git push
          echo "已成功提交并推送更新"
        fi